<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Newfoundland Tattoo Studio — Gallery</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico" />
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
<link rel="icon" type="image/png" sizes="32x32" href="./round-favicon.png" />
<link rel="icon" type="image/png" sizes="48x48" href="./favicon-48x48.png" />
<link rel="icon" type="image/png" sizes="96x96" href="./favicon-96x96.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./favicon-192x192.png" />
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
<link rel="stylesheet" href="./gallery.css" />
</head>
<body>

<div id="viewer"><img id="photo" src="" alt="" /></div>

<div class="nav-area left" id="navPrev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></div>
<div class="nav-area right" id="navNext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>

<div id="counter">0 / 0</div>
<button id="close">&times;</button>
<div id="title"></div>

<script>
/* ── Photo sets ── */
var photoSets = {
  awards: [
    "IMG_0771.webp",
    "IMG_1002.webp",
    "IMG_1004.webp",
    "IMG_1005.webp",
    "IMG_1006.webp",
    "IMG_1007.webp",
    "IMG_1010.webp",
    "IMG_1012.webp",
    "IMG_1084.webp",
    "IMG_1085.webp",
    "IMG_1086.webp",
    "IMG_1087.webp",
    "award-01.webp",
    "award-02.webp",
    "award-03.webp",
    "award-04.webp",
    "award-06.webp",
    "award-07.webp",
    "award-08.webp",
    "award-09.webp",
    "award-10.webp"
  ].map(function(f){return "./Awards/"+f}),
  sakis: [
    "IMG_0010.webp","sakis-01.webp","DSC00444.webp",
    "343F6D14-4EB0-410A-89AE-FFF8853E4D35.webp",
    "LKS04388.webp","LKS04744.webp"
  ].map(function(f){return "./artists/sakis/"+f}),
  george: [
    "IMG_0009.webp",
    "IMG_0011.webp",
    "DSC00639.webp",
    "IMG_0748.webp",
    "IMG_0980.webp",
    "IMG_4795.webp",
    "DSC00084.webp",
    "DSC00412.webp",
    "DSC00919.webp",
    "DSC01022.webp",
    "DSC01086.webp",
    "DSC01124.webp",
    "DSC01152.webp",
    "IMG_4592.webp",
    "LKS02792.webp",
    "LKS02801.webp",
    "LKS03129.webp",
    "LKS03158.webp",
    "LKS03421.webp"
  ].map(function(f){return "./artists/george/"+f}),
  leonidas: [
    "IMG_0012.webp","IMG_6698.webp","IMG_7093.webp",
    "IMG_8143.webp","leonidas-fsr.webp","leonidas-scr.webp"
  ].map(function(f){return "./artists/leonidas/"+f}),
  ortentsa: [
    "IMG_6599.webp","IMG_6601.webp","IMG_6603.webp","IMG_0988.webp",
    "LKS04196.webp","LKS04197.webp","LKS04215.webp"
  ].map(function(f){return "./artists/ortentsa/"+f}),
  studio: [
    "studio-2.webp","studio-3.webp","studio-4.webp",
    "IMG_0987.webp","IMG_1014.webp","IMG_1016.webp","IMG_1017.webp"
  ].map(function(f){return "./artists/studio/"+f})
};

var setNames = {awards:"Awards",sakis:"Sakis",george:"George",leonidas:"Leonidas",ortentsa:"Ortentsa",studio:"Studio"};

/* ── Get set from URL ── */
var params = new URLSearchParams(window.location.search);
var setId = params.get("set") || "awards";
var photos = photoSets[setId] || photoSets.awards;
var idx = 0;

var img = document.getElementById("photo");
var counter = document.getElementById("counter");
var title = document.getElementById("title");

function show(i){
  if(i<0)i=photos.length-1;
  if(i>=photos.length)i=0;
  idx=i;
  img.src=photos[idx];
  counter.textContent=(idx+1)+" / "+photos.length;
  title.textContent=setNames[setId]||setId;
}

document.getElementById("navPrev").onclick=function(){show(idx-1)};
document.getElementById("navNext").onclick=function(){show(idx+1)};

/* Keyboard */
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowLeft")show(idx-1);
  if(e.key==="ArrowRight")show(idx+1);
  if(e.key==="Escape")window.close();
});

/* Touch swipe */
var sx=0;
document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX},{passive:true});
document.addEventListener("touchend",function(e){
  var ex=e.changedTouches[0].clientX;
  var dx=sx-ex;
  if(Math.abs(dx)>50)show(idx+(dx>0?1:-1));
},{passive:true});

document.getElementById("close").onclick=function(){history.back()};

show(0);
</script>
</body>
</html>
