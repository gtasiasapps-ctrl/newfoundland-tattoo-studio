<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Newfoundland Tattoo Studio — Gallery</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="./round-favicon.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080808;--white:#fff;--dim:#a0a0a0;--muted:#666;--faint:#222;--red:#cc3333;--font-sans:system-ui,-apple-system,sans-serif;--font-mono:'SF Mono','Menlo',monospace}
html,body{background:var(--bg);color:var(--white);font-family:var(--font-sans);overflow:hidden;height:100%;width:100%}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* Viewer */
#viewer{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden}
#viewer img{max-width:100vw;max-height:100vh;width:auto;height:auto;object-fit:contain;display:block;user-select:none;-webkit-user-select:none}

/* Nav arrows */
.nav-area{position:fixed;top:0;bottom:0;width:35%;z-index:10;cursor:pointer}
.nav-area.left{left:0}
.nav-area.right{right:0}
.nav-area svg{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;opacity:.3;transition:opacity .3s}
.nav-area:hover svg{opacity:.8}
.nav-area.left svg{left:16px}
.nav-area.right svg{right:16px}

/* Counter */
#counter{position:fixed;top:18px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:.7rem;color:var(--dim);z-index:20;letter-spacing:.15em;opacity:.6}

/* Close */
#close{position:fixed;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:var(--white);font-size:18px;cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;transition:background .3s}
#close:hover{background:rgba(255,255,255,.15)}

/* Title */
#title{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--muted);z-index:20;letter-spacing:.1em;max-width:80%;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

@media(max-width:600px){
  .nav-area{width:30%}
  #counter{font-size:.6rem;top:14px}
  #close{width:34px;height:34px;font-size:16px;top:12px;right:12px}
}
</style>
</head>
<body>

<div id="viewer"><img id="photo" src="" alt="" /></div>

<div class="nav-area left" id="navPrev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></div>
<div class="nav-area right" id="navNext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>

<div id="counter">0 / 0</div>
<button id="close">&times;</button>
<div id="title"></div>

<script>
/* ── Photo sets ── */
var photoSets = {
  awards: [
    "IMG_0771.webp","IMG_1002.webp","IMG_1004.webp","IMG_1005.webp",
    "IMG_1006.webp","IMG_1007.webp","IMG_1009.webp","IMG_1010.webp",
    "award-01.webp","award-02.webp","award-03.webp","award-04.webp",
    "award-05.webp","award-06.webp","award-07.webp","award-08.webp",
    "award-09.webp","award-10.webp","award-11.webp","award-12.webp",
    "award-13.webp","award-14.webp"
  ].map(function(f){return "./Awards/"+f}),
  sakis: [
    "IMG_0010.webp","sakis-01.webp","DSC00444.webp",
    "343F6D14-4EB0-410A-89AE-FFF8853E4D35.webp",
    "LKS04388.webp","LKS04744.webp"
  ].map(function(f){return "./artists/sakis/"+f}),
  george: [
    "IMG_0009.webp","IMG_0011.webp","DSC00639.webp",
    "IMG_0748.webp","IMG_0980.webp","IMG_4795.webp"
  ].map(function(f){return "./artists/george/"+f}),
  leonidas: [
    "IMG_0012.webp","IMG_6698.webp","IMG_7093.webp",
    "IMG_8143.webp","leonidas-fsr.webp","leonidas-scr.webp"
  ].map(function(f){return "./artists/leonidas/"+f}),
  ortentsa: [
    "IMG_6599.webp","IMG_6601.webp","IMG_6603.webp","IMG_0988.webp",
    "LKS04196.webp","LKS04197.webp","LKS04215.webp"
  ].map(function(f){return "./artists/ortentsa/"+f}),
  studio: [
    "studio-2.webp","studio-3.webp","studio-4.webp",
    "IMG_0987.webp","IMG_1014.webp","IMG_1016.webp","IMG_1017.webp"
  ].map(function(f){return "./artists/studio/"+f})
};

var setNames = {awards:"Awards",sakis:"Sakis",george:"George",leonidas:"Leonidas",ortentsa:"Ortentsa",studio:"Studio"};

/* ── Get set from URL ── */
var params = new URLSearchParams(window.location.search);
var setId = params.get("set") || "awards";
var photos = photoSets[setId] || photoSets.awards;
var idx = 0;

var img = document.getElementById("photo");
var counter = document.getElementById("counter");
var title = document.getElementById("title");

function show(i){
  if(i<0)i=photos.length-1;
  if(i>=photos.length)i=0;
  idx=i;
  img.src=photos[idx];
  counter.textContent=(idx+1)+" / "+photos.length;
  title.textContent=setNames[setId]||setId;
}

document.getElementById("navPrev").onclick=function(){show(idx-1)};
document.getElementById("navNext").onclick=function(){show(idx+1)};

/* Keyboard */
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowLeft")show(idx-1);
  if(e.key==="ArrowRight")show(idx+1);
  if(e.key==="Escape")window.close();
});

/* Touch swipe */
var sx=0;
document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX},{passive:true});
document.addEventListener("touchend",function(e){
  var ex=e.changedTouches[0].clientX;
  var dx=sx-ex;
  if(Math.abs(dx)>50)show(idx+(dx>0?1:-1));
},{passive:true});

document.getElementById("close").onclick=function(){history.back()};

show(0);
</script>
</body>
</html>
