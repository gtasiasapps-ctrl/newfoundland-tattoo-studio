<script>
// SPA routing: redirect old/unknown paths
(function(){
  var p = window.location.pathname.replace(/\/+$/,'').toLowerCase();
  var pages = {
    '/studio': '/studio.html',
    '/contact': '/contact.html',
    '/awards': '/awards.html',
    '/services': '/#services',
    '/work': '/#work',
    '/faq': '/#faq',
    '/reviews': '/#reviews'
  };
  if (pages[p] && p !== window.location.pathname) {
    window.location.replace(pages[p]);
    return;
  }
  if (p !== '' && p !== '/' && !pages[p] && !p.match(/\.(html|jpg|png|ico|mp4|xml)$/)) {
    window.location.replace('/');
  }
})();
</script>
